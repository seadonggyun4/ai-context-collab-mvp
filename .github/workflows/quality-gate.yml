name: quality-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/context-collaboration-console
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.17.0
          cache: npm
          cache-dependency-path: projects/context-collaboration-console/package-lock.json
          package-manager-cache: false
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run quality:policy
      - run: npm run build
      - run: npm run quality:performance

  frontend-browser:
    runs-on: macos-14
    defaults:
      run:
        working-directory: projects/context-collaboration-console
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.17.0
          cache: npm
          cache-dependency-path: projects/context-collaboration-console/package-lock.json
          package-manager-cache: false
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run quality:browser
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: projects/context-collaboration-console/playwright-report
          retention-days: 7

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: context_console
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d context_console"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: projects/context-collaboration-console-api
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/context_console
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.12.11
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.9.13
          enable-cache: true
          working-directory: projects/context-collaboration-console-api
      - run: uv sync --frozen
      - run: uv run ruff check app tests
      - run: uv run ruff format --check app tests
      - run: uv run mypy app
      - run: uv run pytest

  blueprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.12.11
      - name: Validate against the current Render JSON Schema
        run: |
          python -m pip install --disable-pip-version-check jsonschema pyyaml
          curl -fsSL https://render.com/schema/render.yaml.json -o /tmp/render-schema.json
          python - <<'PY'
          import json
          from pathlib import Path

          import yaml
          from jsonschema import Draft202012Validator

          schema = json.loads(Path("/tmp/render-schema.json").read_text())
          blueprint = yaml.safe_load(Path("render.yaml").read_text())
          errors = sorted(Draft202012Validator(schema).iter_errors(blueprint), key=lambda item: list(item.path))
          if errors:
              raise SystemExit("\n".join(f"{error.json_path}: {error.message}" for error in errors))
          PY
