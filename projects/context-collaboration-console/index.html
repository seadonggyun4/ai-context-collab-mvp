<!doctype html>
  <html lang="ko" data-theme-preference="system" data-resolved-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="변경 요청의 근거와 검증 결과를 연결하는 Context Console" />
    <meta name="theme-color" content="#115e59" />
    <title>Context Console</title>
  </head>
    <body>
      <script>
        (() => {
          const key = "context-console.theme-preference.v1";
          const stored = localStorage.getItem(key);
          const preference = stored === "light" || stored === "dark" ? stored : "system";
          const resolved = preference === "system" && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : preference === "dark" ? "dark" : "light";
          document.documentElement.dataset.resolvedTheme = resolved;
          document.documentElement.dataset.themePreference = preference;
        })();
      </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
