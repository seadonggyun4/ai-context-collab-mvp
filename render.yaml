# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
previews:
  generation: automatic
  expireAfterDays: 3

services:
  - type: web
    name: context-console-web
    runtime: static
    rootDir: projects/context-collaboration-console
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: checksPass
    previews:
      generation: automatic
    buildFilter:
      paths:
        - projects/context-collaboration-console/**
        - docs/context-collaboration-console/**
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: VITE_DATA_SOURCE
        value: http
        previewValue: fixture
      - key: VITE_AUTH_REQUIRED
        value: "true"
        previewValue: "false"
      - key: VITE_API_BASE_URL
        value: https://context-console-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Content-Security-Policy
        value: default-src 'self'; connect-src 'self' https://context-console-api.onrender.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://context-console-api.onrender.com
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()

  - type: web
    name: context-console-api
    runtime: python
    plan: starter
    region: singapore
    rootDir: .
    buildCommand: pip install uv==0.9.13 && cd projects/context-collaboration-console-api && uv sync --frozen --no-dev
    preDeployCommand: cd projects/context-collaboration-console-api && .venv/bin/alembic upgrade head
    startCommand: cd projects/context-collaboration-console-api && .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips '*'
    healthCheckPath: /health/ready
    autoDeployTrigger: checksPass
    previews:
      generation: automatic
      plan: starter
    buildFilter:
      paths:
        - projects/context-collaboration-console-api/**
        - docs/apc-monitoring-mvp/**
        - docs/context-collaboration-console/**
        - render.yaml
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: APP_ENV
        value: production
        previewValue: preview
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: context-console-db
          property: connectionString
      - key: SECURITY_STORE_URL
        fromService:
          type: keyvalue
          name: context-console-security
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://context-console-web.onrender.com
      - key: FRONTEND_ORIGINS
        value: https://context-console-web.onrender.com
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: none
      - key: SESSION_TTL_SECONDS
        value: "28800"
      - key: OIDC_ISSUER
        sync: false
      - key: OIDC_CLIENT_ID
        sync: false
      - key: OIDC_CLIENT_SECRET
        sync: false
      - key: OIDC_CALLBACK_URL
        value: https://context-console-api.onrender.com/api/v1/auth/callback
      - key: OIDC_ROLE_MAPPING
        sync: false
      - key: DOCUMENT_REPOSITORY
        value: ../..
      - key: DOCUMENT_BRANCH
        value: main

  - type: keyvalue
    name: context-console-security
    plan: starter
    previewPlan: starter
    region: singapore
    maxmemoryPolicy: noeviction
    persistenceMode: journal-snapshot
    ipAllowList: []

databases:
  - name: context-console-db
    databaseName: context_console
    user: context_console
    plan: basic-256mb
    previewPlan: basic-256mb
    region: singapore
    ipAllowList: []
